<!doctype html>
<html>

<head>
    <title>Module 2 CSS - Lesson 5 Box Model - My Animal Fact File</title>
    <style>
        /* Page background — sets the colour and font for the whole page */
        body {
            background-color: lightgreen;
            font-family: Arial, sans-serif;
        }

        /* Box Model — width sets the content area
       padding pushes the text away from the edges
       border draws a visible frame around the fact file
       margin pushes the fact file away from the screen edge */
        .fact-file {
            background-color: cornflowerblue;
            color:antiquewhite;
            border: 4px solid navy;
            padding: 25px 30px;
            margin: 27px 16px;
            width:300px;
        }

        .fact-file h2 {
            margin: 0px;
        }

        /* Animal name — forestgreen so it stands out */
        .animal-name {
            color:darkslateblue;
            font-size: 22px;
        }

        /* Detail rows — dark text on the light background */
        .detail {
            color:darkslateblue;
        }

        /* Cool fact — orange and italic to make it feel special */
        .cool-fact {
            color:blanchedalmond;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="fact-file">
        <h2 class="animal-name">Snow Leopard</h2>
        <p class="detail">Type: Big Cat</p>
        <p class="detail">Lives in: Mountain ranges of Central Asia</p>
        <p class="detail">Diet: Deer, goats, and wild sheep</p>
        <p class="cool-fact">Cool Fact: Can leap up to 15 metres in one jump!</p>
    </div>
</body>

</html>
