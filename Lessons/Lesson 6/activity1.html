<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Module 1 Lesson 6 Activity 1 - Personal Details Form</title>
</head>

<body>
    <h1>Personal Details Form</h1>


    <form>
        <fieldset>
        <legend><h3>fill all the details below</h3></legend>
    
        <label for="name">Name</label> <br />
        <!-- ADD AN INPUT - SIMPLE TEXT TYPE -->
        <input type="text" id="name" name="name">
        <br /><br />
        

        <label for="email">Email ID</label> <br />
        <!-- ADD AN INPUT - EMAIL TYPE -->
         <input type="email" id="email" name="email">
        <br /><br />

        <label for="contact">Contact Number (We won't reveal)</label> <br />
        <!-- ADD AN INPUT - PASSWORD TYPE -->
         <input type="password" id="contact" name="contact">
        <br /><br />

        Gender <br />
        <!-- ADD A LABELS/INPUTS - RADIO TYPE -->
         <label>
            <input type="radio" name="gender" id="male">Male
         </label>
        <br />
        <label>
            <input type="radio" name="gender" id="female">female
        </label>

        <br /><br />

        Favorite food<br />
        <!-- ADD A LABELS/INPUTS - CHECKBOX TYPE -->
        <label>
            <input type="checkbox" name="food" id="pizza">pizza
        </label>
        <br />
        <label>
            <input type="checkbox" name="food" id="burger">burger
        </label>

        <br /><br />
        <input type="submit" value="create new account">
        </fieldset>

    </form>
</body>

</html>
