<!DOCTYPE html>

<html>

<body>

    <h1>Details of Users</h1>

    <form>
        <fieldset>
            <legend>Personal Information:</legend>
            <label>First name:</label>
            <input type="text" id="fname" name="fname"><br><br>
            <label>Last name:</label>
            <input type="text" id="name" name="name"><br><br>
            <label>Gender:</label><br><br>
            <input type="radio" name="subject" value="Male"> Male<br><br>
            <input type="radio" name="subject" value="Female"> Female<br><br>
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email"><br><br>
            <label for="email">Password:</label>
            <input type="password" name="password"><br><br>
            <label for="birthday">Birthday:</label>
            <input type="date" id="birthday" name="birthday"><br><br>
            <label for="email">Thank you for choosing us:</label><br />
            <textarea rows="6" cols="50" name="description">Please enter your reviews with us...</textarea><br><br>
            <label for="email">Image:</label><br><br>
            <input type="file" name="fileupload" accept="image/*" /><br><br><br><br>
            <center>
                <input type="submit" name="submit" value="Submit" />
                <input type="reset" name="reset" value="Reset" />
            </center>
            Congratulations! for choosing us and signing with us.
            Your personal details wont be shared and would be kept private.
        </fieldset>
        
    </form>

</body>

</html>
